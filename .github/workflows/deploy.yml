name: CI/CD Pipeline with GHCR

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # ВАЖНО: Замени maglevchik на твой реальный никнейм на GitHub (только маленькими буквами!)
  IMAGE_NAME: maglevchik/maglevchik-ci_cd_pipeline1 

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    # Даем GitHub Actions права на загрузку образов в твой реестр пакетов
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Устанавливаем Python и нужные библиотеки
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # 2. Запускаем тесты с фиктивными переменными
      - name: Run tests
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: python manage.py test

      # 3. Авторизация в GitHub Container Registry (GHCR)
      - name: Log in to the Container registry
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Сборка и отправка готового образа в облако GitHub
      - name: Build and push Docker image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push # Деплоим только если образ успешно собрался и тесты пройдены

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 5. Копируем на сервер ТОЛЬКО конфигурации (сам код уже внутри образа)
      - name: Copy docker-compose and nginx config to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/root/Maglevchik-CI_CD_pipeline1"

      # 6. Сервер скачивает готовый образ и запускает его
      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/Maglevchik-CI_CD_pipeline1
            # Останавливаем старые контейнеры
            docker-compose down
            # Скачиваем новый готовый образ из GitHub
            docker-compose pull
            # Запускаем новую версию
            docker-compose up -d
            # Применяем миграции к базе данных
            docker-compose exec -T web python manage.py migrate
            # Собираем все картинки и стили в одну папку
            docker-compose exec -T web python manage.py collectstatic --noinput
