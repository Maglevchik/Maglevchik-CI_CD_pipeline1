server {
    listen 80;
    server_name _;

    # 1. Раздача статики (картинки, CSS, стили админки) напрямую через быстрый Nginx
    location /static/ {
        alias /app/static/;
    }

    # 2. Все остальные логические запросы отправляем в приложение (Gunicorn)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}